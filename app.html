<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blend Drop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#eee; font-family:'Inter',sans-serif; min-height:100vh; }

.nav-sf { position:fixed; top:0; left:0; right:0; height:44px; background:#0a0a0a; border-bottom:1px solid #1a1a1a; display:flex; align-items:center; padding:0 16px; z-index:1000; gap:12px; }
.nav-sf a { color:#555; font-size:11px; text-decoration:none; font-weight:500; padding:4px 8px; border-radius:6px; transition:all .15s; }
.nav-sf a:hover { color:#ccc; background:#1a1a1a; }
.nav-sf .active { color:#DC2626; }

.app { max-width:800px; margin:60px auto 40px; padding:0 16px; }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.logo { font-size:22px; font-weight:800; color:#DC2626; display:flex; align-items:center; gap:8px; }

/* Main tabs */
.main-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:1px solid #1a1a1a; }
.main-tab { padding:10px 20px; font-size:14px; font-weight:600; cursor:pointer; color:#555; border-bottom:2px solid transparent; transition:all .15s; }
.main-tab.active { color:#DC2626; border-bottom-color:#DC2626; }
.main-tab:hover:not(.active) { color:#aaa; }

/* Filters bar */
.filters { display:flex; gap:8px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
.filter-select { background:#111; color:#ccc; border:1px solid #222; padding:7px 12px; border-radius:8px; font-size:12px; font-family:inherit; }
.period-toggle { display:flex; gap:0; border:1px solid #222; border-radius:8px; overflow:hidden; }
.period-btn { padding:7px 14px; font-size:12px; font-weight:600; cursor:pointer; background:#111; color:#666; border:none; transition:all .15s; }
.period-btn.active { background:#1a0000; color:#DC2626; }
.period-btn:hover:not(.active) { color:#ccc; }

/* Progress */
.progress-bar { background:#1a1a1a; border-radius:10px; height:6px; margin-bottom:16px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg, #DC2626, #f87171); border-radius:10px; transition:width .4s; }
.progress-text { font-size:12px; color:#666; margin-bottom:6px; display:flex; justify-content:space-between; }

/* Date header */
.date-header { font-size:13px; font-weight:700; color:#888; padding:12px 0 8px; border-bottom:1px solid #111; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
.date-header.today { color:#DC2626; }

/* Card */
.card { background:#0d0d0d; border:1px solid #1a1a1a; border-radius:12px; padding:12px 14px; margin-bottom:6px; transition:border .2s; display:flex; gap:12px; align-items:center; }
.card:hover { border-color:#333; }
.card.published { opacity:.4; }
.card-thumb { width:56px; height:56px; border-radius:8px; object-fit:cover; border:1px solid #222; flex-shrink:0; }
.card-thumb-placeholder { width:56px; height:56px; border-radius:8px; background:#111; border:1px solid #222; display:flex; align-items:center; justify-content:center; color:#333; font-size:18px; flex-shrink:0; }
.card-info { flex:1; min-width:0; }
.card-row1 { display:flex; gap:6px; align-items:center; margin-bottom:3px; }
.card-time { font-size:11px; font-weight:700; color:#DC2626; }
.card-client { font-size:10px; color:#DC2626; background:#1a0000; padding:1px 6px; border-radius:4px; border:1px solid #2a0000; }
.card-title { font-size:13px; font-weight:600; color:#eee; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:3px; }
.card-meta { display:flex; gap:4px; flex-wrap:wrap; }
.badge { font-size:9px; padding:1px 5px; border-radius:3px; }
.badge-pilar { background:#DC262615; color:#f87171; }
.badge-sticker { background:#06b6d415; color:#22d3ee; }
.badge-formato { background:#a78bfa15; color:#a78bfa; }
.badge-tipo { background:#22c55e15; color:#4ade80; }
.card-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.btn-dl { background:none; border:1px solid #222; color:#666; padding:5px 8px; border-radius:6px; cursor:pointer; font-size:12px; text-decoration:none; transition:all .15s; }
.btn-dl:hover { color:#eee; border-color:#555; }
.btn-pub { background:#1a0000; border:1px solid #DC2626; color:#DC2626; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600; transition:all .15s; }
.btn-pub:hover { background:#DC2626; color:#fff; }
.btn-done { background:#071a07; border:1px solid #22c55e; color:#22c55e; padding:5px 10px; border-radius:6px; font-size:11px; font-weight:600; cursor:default; }

/* Week grid */
.week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:16px; }
.week-day { background:#0d0d0d; border:1px solid #1a1a1a; border-radius:8px; padding:8px; text-align:center; cursor:pointer; transition:all .15s; }
.week-day:hover { border-color:#333; }
.week-day.today { border-color:#DC2626; background:#0d0000; }
.week-day.selected { box-shadow:0 0 0 1px #DC2626; }
.week-day-name { font-size:9px; color:#555; font-weight:700; text-transform:uppercase; }
.week-day-num { font-size:18px; font-weight:700; color:#ccc; margin:4px 0; }
.week-day-count { font-size:9px; color:#666; }
.week-day-dots { display:flex; gap:2px; justify-content:center; margin-top:3px; }
.dot { width:5px; height:5px; border-radius:50%; }
.dot-p { background:#DC2626; }
.dot-d { background:#22c55e; }

/* Empty */
/* Compact row for mes */
.row { display:flex; align-items:center; gap:8px; padding:6px 10px; border-bottom:1px solid #0d0d0d; font-size:12px; transition:background .1s; }
.row:hover { background:#0a0a0a; }
.row.pub { opacity:.4; }
.row-client { color:#DC2626; font-size:10px; min-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-title { flex:1; color:#ccc; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-badge { font-size:9px; padding:1px 5px; border-radius:3px; background:#DC262615; color:#f87171; }
.row-time { color:#666; font-size:10px; min-width:36px; }
.row-btn { background:none; border:1px solid #DC2626; color:#DC2626; padding:2px 8px; border-radius:4px; cursor:pointer; font-size:10px; font-weight:600; }
.row-btn:hover { background:#DC2626; color:#fff; }
.row-done { color:#22c55e; font-size:12px; }

.empty { text-align:center; color:#444; padding:60px 20px; font-size:13px; }

/* Toast */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#22c55e; color:#000; padding:8px 20px; border-radius:8px; font-size:12px; font-weight:600; z-index:9999; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }

/* Nav date */
.nav-date { display:flex; align-items:center; gap:6px; }
.nav-date button { background:none; border:1px solid #222; color:#666; cursor:pointer; padding:3px 8px; border-radius:4px; font-size:13px; }
.nav-date button:hover { color:#eee; border-color:#555; }
.nav-date .label { font-size:13px; font-weight:600; color:#aaa; min-width:140px; text-align:center; }

@media(max-width:600px) {
  .week-grid { gap:2px; }
  .week-day { padding:5px 3px; }
  .week-day-num { font-size:14px; }
  .card-thumb,.card-thumb-placeholder { width:44px; height:44px; }
  .main-tab { padding:8px 12px; font-size:12px; }
}
</style>
</head>
<body>

<div class="nav-sf">
  <a href="#" class="active" style="color:#DC2626;font-weight:700;">🚀 Drop</a>
  <a href="#" id="nav-os">SF</a>
  <a href="#" id="nav-unity">Unity</a>
</div>

<div class="app">
  <div class="header">
    <div class="logo"><span>🚀</span> Blend Drop</div>
    <div class="nav-date">
      <button onclick="navDate(-1)">‹</button>
      <div class="label" id="date-label"></div>
      <button onclick="navDate(1)">›</button>
    </div>
  </div>

  <!-- Main tabs: General / Grilla / Historias -->
  <div class="main-tabs">
    <div class="main-tab active" data-tab="general" onclick="setTab('general')">General</div>
    <div class="main-tab" data-tab="grilla" onclick="setTab('grilla')">Grilla</div>
    <div class="main-tab" data-tab="historias" onclick="setTab('historias')">Historias</div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <select class="filter-select" id="filter-cliente" onchange="load()">
      <option value="">Todos los clientes</option>
    </select>
    <div class="period-toggle">
      <button class="period-btn active" data-p="hoy" onclick="setPeriod('hoy')">Hoy</button>
      <button class="period-btn" data-p="semana" onclick="setPeriod('semana')">Semana</button>
      <button class="period-btn" data-p="mes" onclick="setPeriod('mes')">Mes</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const UNITY_URL='https://positive-appreciation-production.up.railway.app';
const OS_URL='https://socialfood-os-production.up.railway.app';
document.getElementById('nav-os').href=OS_URL+'/admin';
document.getElementById('nav-unity').href=UNITY_URL;

let tab='general', period='hoy', currentDate=new Date(), selDay=null, allData=[];
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtMes(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function isToday(s){ return s===fmt(new Date()); }

function updateLabel(){
  const d=currentDate;
  if(period==='hoy'){
    const h=isToday(fmt(d))?'Hoy — ':'';
    document.getElementById('date-label').textContent=h+DIAS[d.getDay()]+' '+d.getDate()+' '+MESES[d.getMonth()];
  } else if(period==='semana'){
    const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    document.getElementById('date-label').textContent=mon.getDate()+' - '+sun.getDate()+' '+MESES[mon.getMonth()];
  } else {
    document.getElementById('date-label').textContent=MESES[d.getMonth()]+' '+d.getFullYear();
  }
}

function navDate(delta){
  if(period==='hoy') currentDate.setDate(currentDate.getDate()+delta);
  else if(period==='semana') currentDate.setDate(currentDate.getDate()+delta*7);
  else currentDate.setMonth(currentDate.getMonth()+delta);
  selDay=null; load();
}

function setTab(t){ tab=t; document.querySelectorAll('.main-tab').forEach(e=>e.classList.toggle('active',e.dataset.tab===t)); render(); }
function setPeriod(p){ period=p; selDay=null; document.querySelectorAll('.period-btn').forEach(e=>e.classList.toggle('active',e.dataset.p===p)); load(); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

function filterData(data){
  let f=data;
  if(tab==='grilla') f=f.filter(p=>p.tipo_pedido!=='historias');
  if(tab==='historias') f=f.filter(p=>p.tipo_pedido==='historias');
  return f;
}

// ── Load ──
async function loadClientes(){
  try{
    const r=await fetch('/api/clientes'); const d=await r.json();
    const sel=document.getElementById('filter-cliente');
    const prev=sel.value;
    sel.innerHTML='<option value="">Todos los clientes</option>';
    (d||[]).forEach(c=>{ sel.innerHTML+=`<option value="${c.id}">${c.name||c.nombre}</option>`; });
    sel.value=prev;
  }catch(e){}
}

async function load(){
  updateLabel();
  const el=document.getElementById('content');
  el.innerHTML='<div class="empty">Cargando...</div>';
  const cid=document.getElementById('filter-cliente').value;

  try{
    if(period==='hoy'){
      let url='/api/hoy?fecha='+fmt(currentDate);
      const r=await fetch(url); const clientes=await r.json();
      allData=[];
      (clientes||[]).forEach(cl=>cl.piezas.forEach(p=>{ p._client=cl.client_name; p.client_id=cl.client_id; allData.push(p); }));
      if(cid) allData=allData.filter(p=>p.client_id==cid);
    } else if(period==='semana'){
      const r=await fetch('/api/semana?fecha='+fmt(currentDate));
      const dias=await r.json();
      allData=[]; (dias||[]).forEach(d=>d.piezas.forEach(p=>{ p._client=p.client_name; p._fecha=d.fecha; p._dia=d.dia; allData.push(p); }));
      if(cid) allData=allData.filter(p=>p.client_id==cid);
      render(); return;
    } else {
      let url='/api/mes?mes='+fmtMes(currentDate);
      if(cid) url+='&client_id='+cid;
      const r=await fetch(url); const piezas=await r.json();
      allData=(piezas||[]).map(p=>({...p, _client:p.client_name}));
    }
    render();
  }catch(e){ el.innerHTML='<div class="empty">Error: '+e.message+'</div>'; }
}

// ── Render ──
function render(){
  const el=document.getElementById('content');
  const data=filterData(allData);

  if(period==='semana' && !selDay){
    renderWeek(data); return;
  }

  const total=data.length;
  const done=data.filter(p=>p.estado==='publicado').length;
  const pct=total?Math.round(done/total*100):0;

  let html='';
  if(total>0){
    html+=`<div class="progress-text"><span>${done} de ${total} publicados</span><span>${pct}%</span></div>`;
    html+=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  }

  if(period==='semana' && selDay){
    const items=data.filter(p=>(p._fecha||p.fecha_publicacion)===selDay);
    html+=`<div style="margin-bottom:12px;"><button onclick="selDay=null;render()" style="background:none;border:1px solid #222;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;">← Semana</button></div>`;
    items.filter(p=>p.estado!=='publicado').forEach(p=>html+=cardHTML(p));
    items.filter(p=>p.estado==='publicado').forEach(p=>html+=cardHTML(p));
  } else if(period==='mes'){
    // Compact rows grouped by date
    const byDate={};
    data.forEach(p=>{
      const d=p.fecha_publicacion||'Sin fecha';
      if(!byDate[d]) byDate[d]=[];
      byDate[d].push(p);
    });
    const dates=Object.keys(byDate).sort();
    dates.forEach(d=>{
      const dt=new Date(d+'T12:00:00');
      const today=isToday(d);
      const pending=byDate[d].filter(p=>p.estado!=='publicado').length;
      const done=byDate[d].filter(p=>p.estado==='publicado').length;
      html+=`<div class="date-header ${today?'today':''}" style="cursor:pointer;" onclick="period='hoy';currentDate=new Date('${d}T12:00:00');document.querySelectorAll('.period-btn').forEach(e=>e.classList.toggle('active',e.dataset.p==='hoy'));load()">
        ${DIAS[dt.getDay()]} ${dt.getDate()}
        <span style="font-size:11px;color:#555;">${pending?pending+' pendiente'+(pending>1?'s':''):''} ${done?'· '+done+' ✓':''}</span>
      </div>`;
      byDate[d].forEach(p=>{
        const pub=p.estado==='publicado';
        html+=`<div class="row ${pub?'pub':''}">
          <span class="row-time">${p.hora_publicacion||''}</span>
          <span class="row-client">${p._client||p.client_name||''}</span>
          <span class="row-title">${p.titulo||'Sin título'}</span>
          <span class="row-badge">${p.tipo_pedido==='historias'?'H':'G'}</span>
          ${pub?'<span class="row-done">✓</span>':`<button class="row-btn" onclick="publicar(${p.id},this)">Publicar</button>`}
        </div>`;
      });
    });
  } else {
    // Hoy: split historias vs grilla
    const historias=data.filter(p=>p.tipo_pedido==='historias');
    const grilla=data.filter(p=>p.tipo_pedido!=='historias');

    if(tab==='general'){
      if(historias.length){
        html+=`<div class="date-header">Historias <span style="font-size:11px;color:#555;">${historias.length}</span></div>`;
        historias.filter(p=>p.estado!=='publicado').forEach(p=>html+=cardHTML(p));
        historias.filter(p=>p.estado==='publicado').forEach(p=>html+=cardHTML(p));
      }
      if(grilla.length){
        html+=`<div class="date-header">Grilla <span style="font-size:11px;color:#555;">${grilla.length}</span></div>`;
        grilla.filter(p=>p.estado!=='publicado').forEach(p=>html+=cardHTML(p));
        grilla.filter(p=>p.estado==='publicado').forEach(p=>html+=cardHTML(p));
      }
    } else {
      const items=tab==='historias'?historias:grilla;
      items.filter(p=>p.estado!=='publicado').forEach(p=>html+=cardHTML(p));
      items.filter(p=>p.estado==='publicado').forEach(p=>html+=cardHTML(p));
    }
  }

  if(!data.length) html='<div class="empty">No hay piezas para publicar</div>';
  el.innerHTML=html;
}

function renderWeek(data){
  const el=document.getElementById('content');
  // Build week from API data
  const r=allData;
  const fechas={};
  r.forEach(p=>{
    const f=p._fecha||p.fecha_publicacion;
    if(!fechas[f]) fechas[f]={fecha:f, piezas:[]};
    fechas[f].piezas.push(p);
  });

  // Get week dates
  const d=new Date(currentDate);
  const mon=new Date(d); mon.setDate(d.getDate()-(d.getDay()||7)+1);
  const dias_semana=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let html='<div class="week-grid">';
  for(let i=0;i<7;i++){
    const dd=new Date(mon); dd.setDate(mon.getDate()+i);
    const ds=fmt(dd);
    const today=isToday(ds);
    const fp=fechas[ds]||{piezas:[]};
    const filtered=filterData(fp.piezas);
    const pending=filtered.filter(p=>p.estado!=='publicado').length;
    const done=filtered.filter(p=>p.estado==='publicado').length;
    let dots='';
    for(let j=0;j<Math.min(pending,6);j++) dots+='<div class="dot dot-p"></div>';
    for(let j=0;j<Math.min(done,6);j++) dots+='<div class="dot dot-d"></div>';

    html+=`<div class="week-day ${today?'today':''}" onclick="selDay='${ds}';render()">
      <div class="week-day-name">${dias_semana[i]}</div>
      <div class="week-day-num">${dd.getDate()}</div>
      <div class="week-day-count">${filtered.length}</div>
      <div class="week-day-dots">${dots}</div>
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function cardHTML(p){
  const pub=p.estado==='publicado';
  const thumb=p.drive_file_id
    ?`<img class="card-thumb" src="${UNITY_URL}/api/drive/thumb/${p.drive_file_id}?size=small" loading="lazy" onerror="this.outerHTML='<div class=card-thumb-placeholder>📷</div>'">`
    :'<div class="card-thumb-placeholder">📷</div>';
  const dl=p.drive_file_id?`<a href="${UNITY_URL}/api/drive/file/${p.drive_file_id}" target="_blank" class="btn-dl">⬇</a>`:'';
  const btn=pub?'<div class="btn-done">✓</div>':`<button class="btn-pub" onclick="publicar(${p.id},this)">Publicar</button>`;

  let badges='';
  if(p.tipo_pedido) badges+=`<span class="badge badge-tipo">${p.tipo_pedido==='historias'?'Historia':'Grilla'}</span>`;
  if(p.pilar) badges+=`<span class="badge badge-pilar">${p.pilar}</span>`;
  if(p.stickers&&p.stickers!=='no usa') badges+=`<span class="badge badge-sticker">${p.stickers}</span>`;
  if(p.formato) badges+=`<span class="badge badge-formato">${p.formato}</span>`;

  return`<div class="card ${pub?'published':''}" id="card-${p.id}">
    ${thumb}
    <div class="card-info">
      <div class="card-row1">
        ${p.hora_publicacion?`<span class="card-time">${p.hora_publicacion}</span>`:''}
        <span class="card-client">${p._client||''}</span>
      </div>
      <div class="card-title">${p.titulo||'Sin título'}</div>
      <div class="card-meta">${badges}</div>
    </div>
    <div class="card-actions">${dl}${btn}</div>
  </div>`;
}

async function publicar(pid,btn){
  btn.disabled=true; btn.textContent='...';
  try{
    const r=await fetch('/api/publicar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pieza_id:pid})});
    if(r.ok){ toast('Publicado'); load(); }
    else{ const d=await r.json(); alert(d.error||'Error'); btn.disabled=false; btn.textContent='Publicar'; }
  }catch(e){ alert('Error: '+e.message); btn.disabled=false; btn.textContent='Publicar'; }
}

// Init
loadClientes();
updateLabel();
load();
</script>
</body>
</html>
