<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blend Drop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a; --panel:#0f0f0f; --line:#1f1f1f; --line2:#2a2a2a;
  --txt:#e8e8e8; --dim:#777; --dim2:#4a4a4a;
  --green:#2E9E5B; --green-b:#0e2a1a; --red:#D64541; --red-b:#2a1010;
  --org:#E55420; --gray:#3a3a3a;
}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;font-size:14px}
.mono{font-family:'Inter Tight',sans-serif;font-variant-numeric:tabular-nums}

/* Topbar */
.top{position:fixed;top:0;left:0;right:0;height:46px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(8,8,8,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.top-l{display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:7px;font-weight:800;letter-spacing:-.02em}
.brand .dot{width:6px;height:6px;background:var(--org);border-radius:50%}
.top a{color:var(--dim);text-decoration:none;font-size:12px;font-weight:600}
.top a:hover{color:var(--txt)}
.seg{display:flex;border:1px solid var(--line2);border-radius:5px;overflow:hidden}
.seg button{background:none;border:none;color:var(--dim);font:inherit;font-size:12px;font-weight:600;padding:5px 12px;cursor:pointer}
.seg button.on{background:#1a1a1a;color:var(--txt)}

.wrap{margin-top:46px;display:flex;min-height:calc(100vh - 46px)}

/* Sidebar clientes */
.side{width:200px;flex-shrink:0;border-right:1px solid var(--line);padding:14px 0;position:sticky;top:46px;height:calc(100vh - 46px);overflow-y:auto}
.side h4{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim2);padding:0 16px 8px;font-weight:700}
.cli{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;border-left:2px solid transparent}
.cli:hover{background:#121212}
.cli.on{border-left-color:var(--org);background:#141008}
.cli .av{width:22px;height:22px;border-radius:50%;background:#1c1c1c;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--dim);flex-shrink:0;overflow:hidden}
.cli .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cli .tz{font-size:9.5px;color:var(--dim2);margin-left:auto;white-space:nowrap}

main{flex:1;min-width:0}

/* ── Mes ── */
.mhead{display:flex;align-items:center;gap:14px;padding:16px 22px 12px}
.mhead .mt{font-size:19px;font-weight:800;letter-spacing:-.02em;text-transform:capitalize}
.nav-b{background:none;border:1px solid var(--line2);color:var(--dim);width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:15px;line-height:1}
.nav-b:hover{color:var(--txt);border-color:#3a3a3a}
.today-b{background:none;border:1px solid var(--line2);color:var(--dim);font:inherit;font-size:12px;font-weight:600;padding:5px 11px;border-radius:5px;cursor:pointer}
.legend{margin-left:auto;display:flex;gap:14px;font-size:11px;color:var(--dim)}
.legend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}
.cal{padding:0 22px 30px}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:1px}
.dow div{font-size:10px;color:var(--dim2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
.cell{background:var(--bg);min-height:96px;padding:7px 8px;cursor:pointer;position:relative;transition:background .1s}
.cell:hover{background:#101010}
.cell.other{opacity:.35}
.cell.today{border-left:3px solid var(--org)}
.cell .dnum{font-size:12px;font-weight:700;color:var(--dim)}
.cell.today .dnum{color:var(--org)}
.cell .dots{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.dotc{width:7px;height:7px;border-radius:2px}
.dg{background:var(--green)} .dr{background:var(--red)} .dp{background:var(--gray)}
.cell .cnt{position:absolute;bottom:6px;right:8px;font-size:10px;color:var(--dim2);font-weight:600}

/* ── Día ── */
.dhead{display:flex;align-items:center;gap:14px;padding:16px 22px 8px;border-bottom:1px solid var(--line);position:sticky;top:46px;background:var(--bg);z-index:20}
.dhead .dt{font-size:18px;font-weight:800;letter-spacing:-.02em;text-transform:capitalize}
.dday{padding:6px 22px 60px}
.cblock{border-bottom:1px solid var(--line);padding:16px 0}
.cbar{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.cbar .av{width:26px;height:26px;border-radius:50%;background:#1c1c1c;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--dim);overflow:hidden}
.cbar .nm{font-size:14px;font-weight:700}
.cbar .huso{font-size:11px;color:var(--org);background:#1a1008;border:1px solid #2e1c0a;padding:2px 8px;border-radius:4px;font-weight:600}
.cbar .res{margin-left:auto;font-size:11.5px;color:var(--dim)}
.cbar .res b{color:var(--green)}
.cbar .cupo{font-size:10.5px;color:var(--dim2);margin-left:10px}

.strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.strip.drag{outline:2px dashed var(--org);outline-offset:3px;border-radius:4px}
.slot{width:120px;height:150px;flex-shrink:0;border:1px solid var(--line2);border-radius:3px;position:relative;overflow:hidden;background:#0c0c0c}
.slot.empty{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;background-image:repeating-linear-gradient(45deg,#0e0e0e,#0e0e0e 7px,#0b0b0b 7px,#0b0b0b 14px)}
.slot.empty .pl{font-size:22px;color:var(--dim2)}
.slot.empty .pt{font-size:9.5px;color:var(--dim2);font-weight:600;text-align:center;padding:0 8px}
.slot.empty.over{border-color:var(--org);background:#140d06}
.slot.loaded{border:2px solid var(--red)}
.slot.scheduled{border:2px solid var(--green)}
.slot.published{border:2px solid var(--gray);opacity:.78}
.slot.failed{border:2px solid #b03030}
.slot img,.slot video{width:100%;height:100%;object-fit:cover;display:block}
.slot .badge{position:absolute;top:5px;left:5px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.b-red{background:var(--red-b);border:1.5px solid var(--red);color:var(--red)}
.b-green{background:var(--green-b);border:1.5px solid var(--green);color:var(--green)}
.b-gray{background:#181818;border:1.5px solid var(--gray);color:var(--dim)}
.slot .kind{position:absolute;top:5px;right:5px;font-size:8px;font-weight:700;background:rgba(0,0,0,.6);color:#bbb;padding:1px 4px;border-radius:2px}
.slot .ribbon{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:18px 7px 6px;display:flex;align-items:center;gap:5px}
.slot .ribbon .st{font-size:10px;font-weight:700}
.slot .ribbon .st.r{color:#ff8a82} .slot .ribbon .st.g{color:#6fe39b}
.slot .acts{position:absolute;inset:0;background:rgba(0,0,0,.72);display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.slot:hover .acts{display:flex}
.slot.empty:hover .acts{display:none}
.sbtn{font:inherit;font-size:11px;font-weight:700;border:1px solid var(--line2);background:#161616;color:var(--txt);padding:5px 12px;border-radius:4px;cursor:pointer;width:88px;text-align:center}
.sbtn:hover{border-color:#444}
.sbtn.prim{background:var(--green-b);border-color:var(--green);color:#7fe6a6}
.sbtn.org{background:#1a1008;border-color:#3a2410;color:#f0a16a}
.addslot{width:120px;height:150px;flex-shrink:0;border:1px dashed var(--line2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--dim2);cursor:pointer;background:none}
.addslot:hover{color:var(--txt);border-color:#3a3a3a}

.prog{position:absolute;bottom:0;left:0;height:3px;background:var(--org);width:0;transition:width .2s}

/* Popover programar */
.pop{position:fixed;z-index:200;background:#141414;border:1px solid var(--line2);border-radius:7px;padding:14px;width:248px;box-shadow:0 12px 40px rgba(0,0,0,.7);display:none}
.pop.open{display:block}
.pop h5{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:10px;font-weight:700}
.toggle{display:flex;border:1px solid var(--line2);border-radius:5px;overflow:hidden;margin-bottom:11px}
.toggle button{flex:1;background:none;border:none;color:var(--dim);font:inherit;font-size:12px;font-weight:700;padding:7px;cursor:pointer}
.toggle button.on{background:#1c1c1c;color:var(--txt)}
.pop input[type=time]{width:100%;background:#0c0c0c;border:1px solid var(--line2);border-radius:5px;color:var(--txt);font:inherit;font-size:15px;padding:9px 11px;font-family:'Inter Tight'}
.pop .dbl{font-size:11px;color:var(--dim);margin:8px 0 12px;min-height:14px}
.pop .dbl b{color:var(--org)}
.pop textarea{width:100%;background:#0c0c0c;border:1px solid var(--line2);border-radius:5px;color:var(--txt);font:inherit;font-size:12px;padding:8px;resize:vertical;min-height:48px;margin-bottom:10px;display:none}
.pop .row{display:flex;gap:7px}
.pop .row button{flex:1;font:inherit;font-size:12px;font-weight:700;padding:9px;border-radius:5px;cursor:pointer;border:1px solid var(--line2);background:none;color:var(--dim)}
.pop .row button.go{background:var(--green);border-color:var(--green);color:#04150b}
.warns{font-size:10.5px;color:#d9a23a;margin-top:8px;line-height:1.4}

.empty-msg{text-align:center;color:var(--dim2);padding:60px;font-size:14px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--line2);color:var(--txt);padding:9px 18px;border-radius:6px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.toast.ok{border-color:var(--green)} .toast.err{border-color:var(--red)}
</style>
</head>
<body>

<div class="top">
  <div class="top-l">
    <span class="brand">Drop<span class="dot"></span></span>
    <div class="seg"><button id="seg-month" class="on" onclick="setView('month')">Mes</button><button id="seg-day" onclick="setView('day')">Día</button></div>
  </div>
  <div style="display:flex;gap:16px;align-items:center">
    <a href="#" onclick="openSettings();return false">Ajustes</a>
    <a href="/logout">Salir</a>
  </div>
</div>

<div class="wrap">
  <aside class="side">
    <h4>Clientes</h4>
    <div id="cli-list"></div>
  </aside>
  <main>
    <div id="view-month"></div>
    <div id="view-day" style="display:none"></div>
  </main>
</div>

<!-- Popover programar -->
<div class="pop" id="pop">
  <h5>Programar publicación</h5>
  <div class="toggle"><button id="dst-story" class="on" onclick="popDest('story')">Historia</button><button id="dst-feed" onclick="popDest('feed')">Feed</button></div>
  <input type="time" id="pop-time" value="12:00" oninput="popDbl()">
  <div class="dbl" id="pop-dbl"></div>
  <textarea id="pop-caption" placeholder="Caption (solo feed)..."></textarea>
  <div class="row"><button onclick="closePop()">Cancelar</button><button class="go" onclick="confirmSchedule()">Programar</button></div>
</div>

<div class="toast" id="toast"></div>

<script>
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DOW=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
let view='month', curMonth=new Date(), curDate=new Date(), clients=[], calData={}, dayData=null, filterClient=null;
let popSlot=null, popDest='story', popTz=null, popDate=null;
const VALE_TZ=Intl.DateTimeFormat().resolvedOptions().timeZone||'America/Santiago';

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function ymOf(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function toast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t?' '+t:'');setTimeout(()=>e.className='toast',2600)}
function initial(n){return (n||'?').trim()[0]?.toUpperCase()||'?'}

async function boot(){
  clients=await (await fetch('/api/clients')).json();
  renderClients();
  setView('month');
}
function renderClients(){
  document.getElementById('cli-list').innerHTML=clients.map(c=>
    `<div class="cli ${filterClient==c.client_id?'on':''}" onclick="toggleClient(${c.client_id})">
      <div class="av">${initial(c.client_name)}</div>
      <div class="nm">${c.client_name||c.ig_username}</div>
      <div class="tz">${(c.timezone||'').split('/').pop().slice(0,3)}</div>
    </div>`).join('');
}
function toggleClient(id){filterClient=filterClient==id?null:id;renderClients();if(view==='month')renderMonth()}

function setView(v){
  view=v;
  document.getElementById('seg-month').className=v==='month'?'on':'';
  document.getElementById('seg-day').className=v==='day'?'on':'';
  document.getElementById('view-month').style.display=v==='month'?'block':'none';
  document.getElementById('view-day').style.display=v==='day'?'block':'none';
  if(v==='month')loadMonth(); else loadDay();
}

// ── MES ──
async function loadMonth(){
  calData=await (await fetch('/api/calendar?month='+ymOf(curMonth))).json();
  renderMonth();
}
function renderMonth(){
  const y=curMonth.getFullYear(),m=curMonth.getMonth();
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  let off=(first.getDay()+6)%7; // lunes=0
  let cells='';
  for(let i=0;i<off;i++){const d=new Date(y,m,1-(off-i));cells+=cellHTML(d,true)}
  for(let day=1;day<=last.getDate();day++)cells+=cellHTML(new Date(y,m,day),false);
  const tot=off+last.getDate(); for(let i=tot;i<Math.ceil(tot/7)*7;i++){const d=new Date(y,m+1,i-tot+1);cells+=cellHTML(d,true)}
  document.getElementById('view-month').innerHTML=`
    <div class="mhead">
      <button class="nav-b" onclick="navMonth(-1)">‹</button>
      <span class="mt">${MESES[m]} ${y}</span>
      <button class="nav-b" onclick="navMonth(1)">›</button>
      <button class="today-b" onclick="goToday()">Hoy</button>
      <div class="legend"><span><i class="dg"></i>Programada</span><span><i class="dr"></i>Sin programar</span><span><i class="dp"></i>Publicada</span></div>
    </div>
    <div class="cal">
      <div class="dow">${DOW.map(d=>`<div>${d}</div>`).join('')}</div>
      <div class="grid">${cells}</div>
    </div>`;
}
function cellHTML(d,other){
  const ds=fmt(d), info=calData[ds], today=ds===fmt(new Date());
  let dots='',cnt='';
  if(info){
    for(let i=0;i<Math.min(info.scheduled,6);i++)dots+='<span class="dotc dg"></span>';
    for(let i=0;i<Math.min(info.loaded,6);i++)dots+='<span class="dotc dr"></span>';
    for(let i=0;i<Math.min(info.published,4);i++)dots+='<span class="dotc dp"></span>';
    cnt=`<span class="cnt mono">${info.scheduled}/${info.total}</span>`;
  }
  return `<div class="cell ${other?'other':''} ${today?'today':''}" onclick="openDay('${ds}')">
    <div class="dnum mono">${d.getDate()}</div><div class="dots">${dots}</div>${cnt}</div>`;
}
function navMonth(n){curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()+n,1);loadMonth()}
function goToday(){curMonth=new Date();loadMonth()}
function openDay(ds){curDate=new Date(ds+'T12:00:00');setView('day')}

// ── DÍA ──
async function loadDay(){
  dayData=await (await fetch('/api/day?date='+fmt(curDate))).json();
  renderDay();
  loadCupos();
}
function renderDay(){
  const d=curDate, ds=fmt(d);
  const lbl=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][d.getDay()]+' '+d.getDate()+' '+MESES[d.getMonth()];
  let cl=dayData.clients;
  if(filterClient)cl=cl.filter(c=>c.client_id==filterClient);
  const blocks=cl.map(c=>{
    const slots=c.slots, byPos={}; slots.forEach(s=>byPos[s.position]=s);
    const maxPos=Math.max(4, ...slots.map(s=>s.position));
    let cells='';
    for(let p=0;p<=maxPos;p++) cells+= byPos[p]?slotHTML(byPos[p],c):emptyHTML(c,ds,p);
    cells+=`<div class="addslot" onclick="addSlot(${c.client_id},'${ds}',${maxPos+1})">+</div>`;
    const withMedia=slots.filter(s=>s.media_filename).length;
    const prog=slots.filter(s=>s.status==='scheduled'||s.status==='published').length;
    return `<div class="cblock">
      <div class="cbar">
        <div class="av">${initial(c.client_name)}</div>
        <span class="nm">${c.client_name}</span>
        <span class="huso">${c.tz_label}</span>
        <span class="res"><b>${prog}</b>/${withMedia} programadas</span>
        <span class="cupo mono" id="cupo-${c.client_id}"></span>
      </div>
      <div class="strip" data-client="${c.client_id}" data-date="${ds}"
        ondragover="stripOver(event)" ondragleave="stripLeave(event)" ondrop="stripDrop(event,${c.client_id},'${ds}')">${cells}</div>
    </div>`;
  }).join('');
  document.getElementById('view-day').innerHTML=`
    <div class="dhead"><button class="nav-b" onclick="setView('month')">‹</button><span class="dt">${lbl}</span>
      <button class="nav-b" onclick="navDay(-1)">‹</button><button class="nav-b" onclick="navDay(1)">›</button></div>
    <div class="dday">${blocks||'<div class="empty-msg">Sin clientes configurados</div>'}</div>`;
}
function navDay(n){curDate=new Date(curDate.getFullYear(),curDate.getMonth(),curDate.getDate()+n);loadDay()}

function emptyHTML(c,ds,p){
  return `<div class="slot empty" data-client="${c.client_id}" data-date="${ds}" data-pos="${p}"
    onclick="pickFile(${c.client_id},'${ds}',${p})"
    ondragover="slotOver(event)" ondragleave="slotLeave(event)" ondrop="slotDrop(event,${c.client_id},'${ds}',${p})">
    <div class="pl">+</div><div class="pt">Soltar gráfica</div></div>`;
}
function slotHTML(s,c){
  const media=s.kind==='video'
    ? `<video src="/media/${s.media_filename}" muted></video>`
    : `<img src="/media/${s.media_filename}" loading="lazy">`;
  const badge=s.status==='scheduled'?'<div class="badge b-green">✓</div>'
    : s.status==='published'?'<div class="badge b-gray">↑</div>'
    : s.status==='failed'?'<div class="badge b-red">!</div>'
    : '<div class="badge b-red">●</div>';
  const stTxt=s.status==='scheduled'?`<span class="st g mono">✓ ${s.local_time||''}</span>`
    : s.status==='published'?'<span class="st mono" style="color:#999">Publicada</span>'
    : s.status==='failed'?'<span class="st r">Falló</span>'
    : '<span class="st r">Sin programar</span>';
  let acts='';
  if(s.status==='loaded'){
    acts=`<button class="sbtn prim" onclick="openPop(event,${s.id},'${c.timezone}','${s.slot_date}')">Programar</button>
          <button class="sbtn" onclick="dl(${s.id})">Descargar</button>
          <button class="sbtn" onclick="publishNow(${s.id})">Publicar ya</button>
          <button class="sbtn" onclick="removeSlot(${s.id})">Quitar</button>`;
  }else if(s.status==='scheduled'){
    acts=`<button class="sbtn org" onclick="unschedule(${s.id})">Desprogramar</button>
          <button class="sbtn" onclick="dl(${s.id})">Descargar</button>`;
  }else{
    acts=`<button class="sbtn" onclick="dl(${s.id})">Descargar</button>`;
    if(s.status==='failed')acts=`<button class="sbtn prim" onclick="openPop(event,${s.id},'${c.timezone}','${s.slot_date}')">Reintentar</button>`+acts;
    acts+=`<button class="sbtn" onclick="removeSlot(${s.id})">Quitar</button>`;
  }
  return `<div class="slot ${s.status}" title="${s.error_msg||''}">${media}${badge}
    <div class="kind">${s.kind==='video'?'▶':'IMG'} ${s.destino}</div>
    <div class="ribbon">${stTxt}</div><div class="acts">${acts}</div></div>`;
}

// ── Cupos ──
async function loadCupos(){
  for(const c of dayData.clients){
    fetch('/api/limit/'+c.client_id).then(r=>r.json()).then(d=>{
      const e=document.getElementById('cupo-'+c.client_id);
      if(e&&d&&d.total!=null)e.textContent='cupo '+d.remaining+'/'+d.total;
    }).catch(()=>{});
  }
}

// ── Drag & drop ──
function slotOver(e){e.preventDefault();e.currentTarget.classList.add('over')}
function slotLeave(e){e.currentTarget.classList.remove('over')}
function slotDrop(e,cid,ds,p){e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('over');
  const f=e.dataTransfer.files;if(f.length)uploadOne(f[0],cid,ds,p,e.currentTarget)}
function stripOver(e){e.preventDefault();e.currentTarget.classList.add('drag')}
function stripLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drag')}
function stripDrop(e,cid,ds){e.preventDefault();e.currentTarget.classList.remove('drag');
  const f=[...e.dataTransfer.files];if(f.length>1){uploadBatch(f,cid,ds)}else if(f.length===1){
    // dejar que el slot puntual lo maneje si cayó sobre uno; si cayó en hueco de la tira, va a batch
    uploadBatch(f,cid,ds)}}

function pickFile(cid,ds,p){const i=document.createElement('input');i.type='file';i.accept='image/*,video/mp4';
  i.onchange=()=>i.files[0]&&uploadOne(i.files[0],cid,ds,p);i.click()}
function addSlot(cid,ds,p){pickFile(cid,ds,p)}

async function uploadOne(file,cid,ds,pos,slotEl){
  const fd=new FormData();fd.append('file',file);fd.append('client_id',cid);fd.append('date',ds);fd.append('position',pos);
  fd.append('destino','story');
  // preview instantáneo
  if(slotEl){const r=new FileReader();r.onload=ev=>{slotEl.classList.remove('empty');slotEl.innerHTML=`<img src="${ev.target.result}"><div class="prog" id="p-up"></div>`};r.readAsDataURL(file)}
  try{
    const xhr=new XMLHttpRequest();xhr.open('POST','/api/slot/upload');
    xhr.upload.onprogress=e=>{const b=document.getElementById('p-up');if(b)b.style.width=(e.loaded/e.total*100)+'%'};
    const done=new Promise((res,rej)=>{xhr.onload=()=>res(JSON.parse(xhr.responseText));xhr.onerror=rej});
    xhr.send(fd);const d=await done;
    if(d.error){toast(d.error,'err')}else{if(d.warnings&&d.warnings.length)toast('⚠ '+d.warnings[0]);loadDay()}
  }catch(e){toast('Error al subir','err');loadDay()}
}
async function uploadBatch(files,cid,ds){
  const fd=new FormData();files.forEach(f=>fd.append('file',f));fd.append('client_id',cid);fd.append('date',ds);fd.append('destino','story');
  toast('Subiendo '+files.length+'…');
  try{const d=await (await fetch('/api/slot/upload-batch',{method:'POST',body:fd})).json();
    toast((d.slots?d.slots.length:0)+' subidas ✓','ok');loadDay()}catch(e){toast('Error','err')}
}

// ── Popover programar ──
function openPop(e,sid,tz,ds){e.stopPropagation();popSlot=sid;popTz=tz;popDate=ds;popDest='story';
  document.getElementById('dst-story').className='on';document.getElementById('dst-feed').className='';
  document.getElementById('pop-caption').style.display='none';document.getElementById('pop-caption').value='';
  const now=new Date();document.getElementById('pop-time').value=String(now.getHours()).padStart(2,'0')+':00';
  popDbl();
  const p=document.getElementById('pop');p.classList.add('open');
  const r=e.target.getBoundingClientRect();
  p.style.left=Math.min(r.left,window.innerWidth-262)+'px';
  p.style.top=Math.min(r.bottom+6,window.innerHeight-280)+'px';
}
function closePop(){document.getElementById('pop').classList.remove('open');popSlot=null}
function popDestFn(d){popDest=d}
window.popDest=function(d){popDest=d;document.getElementById('dst-story').className=d==='story'?'on':'';
  document.getElementById('dst-feed').className=d==='feed'?'on':'';
  document.getElementById('pop-caption').style.display=d==='feed'?'block':'none';popDbl()}
function popDbl(){
  const t=document.getElementById('pop-time').value;const tz=popTz||'America/Santiago';
  let txt=`<b>${t}</b> hora de ${tz.split('/').pop().replace('_',' ')}`;
  try{
    if(tz!==VALE_TZ){
      const [hh,mm]=t.split(':');const local=new Date(popDate+'T'+t+':00');
      // convertir: interpretar t como hora del cliente, mostrar equivalente en tz de la Vale
      const asClient=new Date(new Date(popDate+'T'+t+':00').toLocaleString('en-US',{timeZone:tz}));
      const diff=new Date(popDate+'T'+t+':00')-asClient;
      const valeT=new Date(new Date(popDate+'T'+t+':00').getTime()+diff);
      txt+=` <span style="color:#777">(≈ ${String(valeT.getHours()).padStart(2,'0')}:${String(valeT.getMinutes()).padStart(2,'0')} tuya)</span>`;
    }
  }catch(e){}
  document.getElementById('pop-dbl').innerHTML=txt;
}
async function confirmSchedule(){
  if(!popSlot)return;
  const body={local_time:document.getElementById('pop-time').value,destino:popDest,caption:document.getElementById('pop-caption').value};
  const d=await (await fetch('/api/slot/'+popSlot+'/schedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
  if(d.ok){toast('Programada ✓','ok');closePop();loadDay()}else toast(d.error||'Error','err');
}
document.addEventListener('click',e=>{if(!e.target.closest('.pop')&&!e.target.closest('.sbtn'))closePop()});

// ── Acciones ──
function dl(id){window.open('/api/slot/'+id+'/download','_blank')}
async function unschedule(id){const d=await (await fetch('/api/slot/'+id+'/unschedule',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})).json();if(d.ok){toast('Desprogramada');loadDay()}}
async function removeSlot(id){if(!confirm('¿Quitar esta gráfica del slot?'))return;const d=await (await fetch('/api/slot/'+id,{method:'DELETE'})).json();if(d.ok){toast('Quitada'+(d.warning?' ('+d.warning+')':''));loadDay()}}
async function publishNow(id){if(!confirm('¿Publicar esta historia ahora mismo?'))return;toast('Publicando…');
  const d=await (await fetch('/api/slot/'+id+'/publish-now',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})).json();
  if(d.ok){toast('Publicada ✓','ok')}else toast(d.error||'Error','err');loadDay()}

// ── Ajustes timezone ──
async function openSettings(){
  const accs=await (await fetch('/api/ig-accounts')).json();
  const zones=['America/Santiago','America/Argentina/Buenos_Aires','America/Lima','America/Bogota','America/Mexico_City','America/New_York','Europe/Madrid'];
  const rows=accs.map(a=>`<div style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a">
    <span style="flex:1;font-size:13px">${a.client_name} <span style="color:#666">@${a.ig_username}</span></span>
    <select onchange="setTz(${a.client_id},this.value)" style="background:#0c0c0c;color:#ddd;border:1px solid #2a2a2a;border-radius:4px;padding:6px;font:inherit">
      ${zones.map(z=>`<option value="${z}" ${a.timezone===z?'selected':''}>${z.split('/').pop().replace('_',' ')}</option>`).join('')}
    </select></div>`).join('');
  const ov=document.createElement('div');ov.id='settings-ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center';
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div style="background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:22px;width:480px;max-height:80vh;overflow:auto">
    <h3 style="font-size:15px;margin-bottom:4px">Zona horaria por cliente</h3>
    <p style="font-size:11.5px;color:#777;margin-bottom:14px">Cada cliente publica a su hora local. Chile por defecto.</p>${rows}</div>`;
  document.body.appendChild(ov);
}
async function setTz(id,tz){const d=await (await fetch('/api/clients/'+id+'/timezone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({timezone:tz})})).json();
  if(d.ok){toast('Huso actualizado ✓','ok');clients=await (await fetch('/api/clients')).json();renderClients()}}

boot();
</script>
